# cargo-deny license policy. Enforced in CI (`cargo deny check licenses`) so a
# dependency update that pulls in a copyleft (GPL/AGPL/SSPL) crate fails the
# build instead of shipping silently. The allow-list is the set of permissive
# (plus file-level-copyleft MPL-2.0) licenses actually present in the tree today;
# see the licensing review. SPDX OR-expressions are satisfied when any listed
# license matches, so an alternative like `MIT OR Apache-2.0 OR LGPL-2.1-or-later`
# resolves to the permissive side without allowing LGPL outright.

[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.9

# The Apache-2.0 crates that carry the LLVM exception (e.g. the `wasm`/`target`
# helpers) are covered by the base Apache-2.0 allow plus this exception.
exceptions = []

[licenses.private]
# Our own workspace crates are unpublished (source == null); skip them.
ignore = true
