<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- taskstream app icon: a stream of task rows on an accent-blue tile.
       Two pending rows (ring markers) flow into a completed row (checkmark),
       reading as a task list / stream. Accent matches the UI token #3b6ea5. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a86c4"/>
      <stop offset="1" stop-color="#2f5f92"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <g fill="none" stroke="#ffffff" stroke-linecap="round" stroke-linejoin="round">
    <!-- Row 1: pending -->
    <circle cx="300" cy="356" r="46" stroke-width="44"/>
    <line x1="430" y1="356" x2="748" y2="356" stroke-width="72"/>

    <!-- Row 2: pending -->
    <circle cx="300" cy="512" r="46" stroke-width="44"/>
    <line x1="430" y1="512" x2="700" y2="512" stroke-width="72"/>

    <!-- Row 3: done -->
    <polyline points="250,672 296,720 366,632" stroke-width="60"/>
    <line x1="430" y1="668" x2="640" y2="668" stroke-width="72"/>
  </g>
</svg>
