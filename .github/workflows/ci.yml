name: CI
on:
  push:
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo fmt --all --check
      # The gui crate (tauri) needs webkit2gtk system libraries to build; it is
      # linted separately in the webkit-equipped container (see the e2e job), so
      # the host jobs cover core + cli only.
      - run: cargo clippy --workspace --exclude laba-gui --all-targets --all-features -- -D warnings
      - run: cargo doc --workspace --exclude laba-gui --no-deps

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-26.04, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-nextest
      - run: cargo nextest run --workspace --exclude laba-gui
      - run: cargo test --workspace --exclude laba-gui --doc

  coverage:
    # Line coverage for the Rust core + cli via cargo-llvm-cov. The observed
    # baseline is ~87% lines; the floor sits a few points under it so it catches
    # a gross regression without false-failing on normal fluctuation.
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - uses: taiki-e/install-action@a6b2e2dcd845ddd7f509ce4f3ed3d922b80cc5d9 # v2.84.0
        with:
          tool: cargo-llvm-cov,cargo-nextest
      - run: cargo llvm-cov nextest --workspace --exclude laba-gui --summary-only --fail-under-lines 80

  scripts:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Install shellcheck and jq
        run: sudo apt-get update && sudo apt-get install -y shellcheck jq
      - name: Lint shell scripts
        run: shellcheck scripts/*.sh scripts/tests/*.sh
      - name: Run script tests
        run: |
          for t in scripts/tests/*.test.sh; do
            echo "== $t =="
            "$t"
          done

  gui:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: gui/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run check
      - run: npm run test:coverage

  e2e:
    # WebdriverIO + tauri-driver smoke of the built app. Runs in the same image
    # used locally (webkit2gtk + WebKitWebDriver + tauri-driver + xvfb bundled),
    # so CI matches `scripts/tauri-container.sh`. seccomp is relaxed because the
    # webkit/WebDriver sandbox needs syscalls the default profile blocks.
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    container:
      image: ivangabriele/tauri:debian-bookworm-22
      options: --security-opt seccomp=unconfined
    defaults:
      run:
        working-directory: gui
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: npm ci
      # The gui crate's Rust is linted here, where webkit2gtk is available (the
      # host lint job excludes it). Kept ahead of the e2e build so a clippy
      # regression fails fast.
      - run: cargo clippy -p laba-gui --all-targets -- -D warnings
      # The gui crate's Rust unit tests run here too: the host `test` job excludes
      # laba-gui (no webkit2gtk there), so this is the only place they execute.
      - run: cargo test -p laba-gui
      # onPrepare builds the frontend and a release binary (embedded assets),
      # then tauri-driver launches it through WebKitWebDriver under xvfb.
      - run: xvfb-run -a npx wdio run wdio.conf.js
