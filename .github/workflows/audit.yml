name: Audit
on:
  push:
    paths: ["**/Cargo.toml", "**/Cargo.lock"]
  pull_request:
    paths: ["**/Cargo.toml", "**/Cargo.lock"]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
