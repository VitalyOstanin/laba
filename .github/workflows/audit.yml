name: Audit
on:
  push:
    paths: ["**/Cargo.toml", "**/Cargo.lock", "deny.toml"]
  pull_request:
    paths: ["**/Cargo.toml", "**/Cargo.lock", "deny.toml"]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  issues: write
  # rustsec/audit-check publishes results as a check run.
  checks: write

jobs:
  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: rustsec/audit-check@69366f33c96575abad1ee0dba8212993eecbe998 # v2.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # This action does not read .cargo/audit.toml, so the ignored
          # advisories are duplicated here (see .cargo/audit.toml for the
          # rationale). Both are transitive Tauri/GTK deps not reachable from
          # our code: glib 0.18 unsoundness and proc-macro-error unmaintained.
          ignore: RUSTSEC-2024-0429,RUSTSEC-2024-0370

  # Enforce the dependency license policy (deny.toml): a dependency update that
  # pulls in a copyleft crate fails here instead of shipping in a binary release.
  licenses:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: taiki-e/install-action@07b4745e0c39a41822af610387492e3e53aa222b # v2.83.4
        with:
          tool: cargo-deny
      - run: cargo deny check licenses
