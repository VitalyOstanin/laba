name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release (vX.Y.Z)
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  gate:
    needs: [ci]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - name: Resolve tag
        id: tag
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="$(scripts/release-validate-tag.sh "$tag")"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Check version matches manifest
        run: |
          manifest="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          test "$manifest" = "${{ steps.tag.outputs.version }}" || { echo "tag != Cargo.toml version" >&2; exit 1; }
      - run: chmod +x scripts/*.sh && scripts/check-changelog.sh "${{ steps.tag.outputs.version }}"

  # Create (or reuse) the release once, up front, so the CLI and GUI package jobs
  # upload into a single release instead of racing on `gh release create`.
  create-release:
    needs: [gate]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v7
      - name: Create or reuse the release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.gate.outputs.tag }}"
          gh release create "$tag" --verify-tag --title "$tag" --notes "See CHANGELOG.md" || true
          id="$(gh release view "$tag" --json databaseId -q .databaseId)"
          echo "release_id=$id" >> "$GITHUB_OUTPUT"

  package:
    needs: [create-release, gate]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - run: cargo build --release --locked --target ${{ matrix.target }} --bin laba
      - name: Package
        shell: bash
        run: |
          tag="${{ needs.gate.outputs.tag }}"
          bin=laba
          ext=""
          [[ "${{ matrix.target }}" == *windows* ]] && ext=".exe"
          dir="${bin}-${tag}-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/${bin}${ext}" "$dir/"
          cp README.md LICENSE "$dir/"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            7z a "${dir}.zip" "$dir" >/dev/null
            asset="${dir}.zip"
          else
            tar czf "${dir}.tar.gz" "$dir"
            asset="${dir}.tar.gz"
          fi
          sha256sum "$asset" > "${asset}.sha256" 2>/dev/null || shasum -a 256 "$asset" > "${asset}.sha256"
          echo "ASSET=$asset" >> "$GITHUB_ENV"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ needs.gate.outputs.tag }}"
          gh release upload "$tag" "$ASSET" "${ASSET}.sha256" --clobber

  # GUI desktop bundle for Linux. Built on the oldest supported Ubuntu so the
  # AppImage links against an older glibc and runs on a wider range of distros.
  # tauri-action signs the AppImage updater artifact (AppImage + .sig) when the
  # signing secrets are present. latest.json is assembled later by updater-json,
  # so uploadUpdaterJson is disabled here to avoid concurrent writes.
  gui-linux:
    needs: [create-release, gate]
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: gui/package-lock.json
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install Linux bundle dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils
      - name: Install frontend dependencies
        working-directory: gui
        run: npm ci
      - name: Build, sign and upload the Linux GUI bundle
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: gui
          releaseId: ${{ needs.create-release.outputs.release_id }}
          uploadUpdaterJson: false
          args: --bundles appimage,deb
      # tauri-action bundles libwayland-client into the AppImage, which makes
      # the webview come up blank (EGL_BAD_PARAMETER) on modern distros. Drop
      # that library, repack, re-sign, and replace the uploaded asset + .sig
      # before the portable tarball is built from it.
      - name: Fix AppImage for modern distros
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ needs.gate.outputs.tag }}"
          appimage="$(find target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' | head -n1)"
          test -n "$appimage" || { echo "AppImage not found under target/release/bundle/appimage" >&2; exit 1; }
          scripts/fix-appimage.sh "$appimage"
          gh release upload "$tag" "$appimage" "${appimage}.sig" --clobber
      # Portable tarball of the self-contained AppImage, for users who install
      # neither the .deb nor run the AppImage in place.
      - name: Portable tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.gate.outputs.tag }}"
          appimage="$(find target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' | head -n1)"
          test -n "$appimage" || { echo "AppImage not found under target/release/bundle/appimage" >&2; exit 1; }
          asset="laba-${tag}-linux-x86_64.tar.gz"
          tar czf "$asset" -C "$(dirname "$appimage")" "$(basename "$appimage")"
          sha256sum "$asset" > "${asset}.sha256"
          gh release upload "$tag" "$asset" "${asset}.sha256" --clobber

  # GUI desktop bundle for Windows (NSIS installer). The NSIS target is the one
  # the Tauri updater consumes on Windows; its .sig is signed when the secrets
  # are present. latest.json is assembled by updater-json (uploadUpdaterJson off).
  gui-windows:
    needs: [create-release, gate]
    permissions:
      contents: write
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: gui/package-lock.json
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install frontend dependencies
        working-directory: gui
        run: npm ci
      - name: Build, sign and upload the Windows GUI bundle
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: gui
          releaseId: ${{ needs.create-release.outputs.release_id }}
          uploadUpdaterJson: false
          args: --bundles nsis

  # GUI desktop bundle for macOS (DMG, both architectures). Without a paid Apple
  # signing key the app cannot self-update, so updater artifacts are disabled via
  # the macos-noupdater config override and macOS ships as a notification-only
  # download (the GUI opens the release page instead of self-installing).
  gui-macos:
    needs: [create-release, gate]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            target: aarch64-apple-darwin
          - arch: x86_64
            target: x86_64-apple-darwin
    runs-on: macos-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: gui/package-lock.json
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      - name: Install frontend dependencies
        working-directory: gui
        run: npm ci
      - name: Build and upload the macOS GUI bundle (no updater artifacts)
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: gui
          releaseId: ${{ needs.create-release.outputs.release_id }}
          uploadUpdaterJson: false
          args: >-
            --target ${{ matrix.target }}
            --bundles dmg
            --config src-tauri/tauri.macos-noupdater.conf.json

  # Assemble latest.json deterministically from the .sig files uploaded by the
  # Linux and Windows GUI jobs, then upload it to the release. Running after both
  # jobs (instead of uploadUpdaterJson on each) avoids the race on latest.json.
  # An unsigned build has no .sig assets, in which case latest.json is skipped.
  updater-json:
    needs: [create-release, gate, gui-linux, gui-windows]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - name: Assemble and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.gate.outputs.tag }}"
          version="${{ needs.gate.outputs.version }}"
          sigdir="$(mktemp -d)"
          gh release download "$tag" --dir "$sigdir" --pattern '*.sig' || true
          if ! ls "$sigdir"/*.sig >/dev/null 2>&1; then
            echo "no .sig assets on the release (unsigned build?); skipping latest.json" >&2
            exit 0
          fi
          chmod +x scripts/build-updater-json.sh
          if scripts/build-updater-json.sh "${{ github.repository }}" "$tag" "$version" "$sigdir" latest.json; then
            gh release upload "$tag" latest.json --clobber
          else
            rc=$?
            if [ "$rc" -eq 3 ]; then
              echo "no mappable signatures; skipping latest.json" >&2
            else
              exit "$rc"
            fi
          fi
