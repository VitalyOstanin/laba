name: Release
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to release (vX.Y.Z)
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  gate:
    needs: [ci]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v7
      - name: Resolve tag
        id: tag
        run: |
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          version="$(scripts/release-validate-tag.sh "$tag")"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Check version matches manifest
        run: |
          manifest="$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          test "$manifest" = "${{ steps.tag.outputs.version }}" || { echo "tag != Cargo.toml version" >&2; exit 1; }
      - run: chmod +x scripts/*.sh && scripts/check-changelog.sh "${{ steps.tag.outputs.version }}"

  # Create (or reuse) the release once, up front, so the CLI and GUI package jobs
  # upload into a single release instead of racing on `gh release create`.
  create-release:
    needs: [gate]
    permissions:
      contents: write
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - uses: actions/checkout@v7
      - name: Create or reuse the release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.gate.outputs.tag }}"
          gh release create "$tag" --verify-tag --title "$tag" --notes "See CHANGELOG.md" || true
          id="$(gh release view "$tag" --json databaseId -q .databaseId)"
          echo "release_id=$id" >> "$GITHUB_OUTPUT"

  package:
    needs: [create-release, gate]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked --target ${{ matrix.target }} --bin laba
      - name: Package
        shell: bash
        run: |
          tag="${{ needs.gate.outputs.tag }}"
          bin=laba
          ext=""
          [[ "${{ matrix.target }}" == *windows* ]] && ext=".exe"
          dir="${bin}-${tag}-${{ matrix.target }}"
          mkdir "$dir"
          cp "target/${{ matrix.target }}/release/${bin}${ext}" "$dir/"
          cp README.md LICENSE "$dir/"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            7z a "${dir}.zip" "$dir" >/dev/null
            asset="${dir}.zip"
          else
            tar czf "${dir}.tar.gz" "$dir"
            asset="${dir}.tar.gz"
          fi
          sha256sum "$asset" > "${asset}.sha256" 2>/dev/null || shasum -a 256 "$asset" > "${asset}.sha256"
          echo "ASSET=$asset" >> "$GITHUB_ENV"
      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ needs.gate.outputs.tag }}"
          gh release upload "$tag" "$ASSET" "${ASSET}.sha256" --clobber

  # GUI desktop bundle for Linux. Built on the oldest supported Ubuntu so the
  # AppImage links against an older glibc and runs on a wider range of distros.
  # tauri-action signs the updater artifacts (AppImage + .sig) when the signing
  # secrets are present and generates latest.json (uploadUpdaterJson).
  gui-bundle:
    needs: [create-release, gate]
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: gui/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux bundle dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf xdg-utils
      - name: Install frontend dependencies
        working-directory: gui
        run: npm ci
      - name: Build, sign and upload the GUI bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: gui
          releaseId: ${{ needs.create-release.outputs.release_id }}
          uploadUpdaterJson: true
          args: --bundles appimage,deb
      # Portable tarball of the self-contained AppImage, for users who install
      # neither the .deb nor run the AppImage in place.
      - name: Portable tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ needs.gate.outputs.tag }}"
          appimage="$(find target/release/bundle/appimage -maxdepth 1 -name '*.AppImage' | head -n1)"
          test -n "$appimage" || { echo "AppImage not found under target/release/bundle/appimage" >&2; exit 1; }
          asset="laba-${tag}-linux-x86_64.tar.gz"
          tar czf "$asset" -C "$(dirname "$appimage")" "$(basename "$appimage")"
          sha256sum "$asset" > "${asset}.sha256"
          gh release upload "$tag" "$asset" "${asset}.sha256" --clobber
